<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0d6efd" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Entrega de Turno – Alcohol</title>

<style>
:root { --c1:#0d6efd; --c2:#198754; --c3:#dc3545; --c4:#6b7280; --bg:#f4f6fb; }
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:#111827}
header{position:sticky;top:0;background:#fff;padding:.9rem 1rem;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.06)}
header h1{margin:0;font-size:1.15rem}
.sub{font-size:.85rem;color:#64748b;display:flex;gap:.6rem;flex-wrap:wrap}
.version{background:#eef2ff;border-radius:20px;padding:.1rem .5rem;font-size:.75rem;cursor:pointer}
.wrap{max-width:960px;margin:auto;padding:1rem;padding-bottom:7rem}
fieldset{border:1px solid #e5e7eb;border-radius:12px;margin:.9rem 0;background:#fff;padding:.9rem}
legend{padding:0 .6rem;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:.8rem}
.col-12{grid-column:span 12}.col-6{grid-column:span 6}
@media(max-width:760px){.col-6{grid-column:span 12}}
label{display:block;font-weight:500;margin-bottom:.25rem}
input,select,textarea{width:100%;padding:.8rem;border-radius:12px;border:1px solid #d1d5db}
.readonly{background:#f3f6fb}
textarea{min-height:80px}
.hint,.muted{font-size:.83rem;color:#6b7280}
.actionbar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:.5rem;padding:.6rem;background:#fff;box-shadow:0 -4px 16px rgba(0,0,0,.1)}
.actionbar button{flex:1;border:none;border-radius:12px;color:#fff;font-weight:700;padding:.75rem}
.primary{background:#0d6efd}.success{background:#198754}.ghost{background:#fff;color:#000;border:1px solid #ccc}.secondary{background:#6b7280}
.error-msg{color:#dc3545;font-size:.8rem;display:none}
.show{display:block}
</style>
</head>

<body>

<header>
  <h1>Entrega de Turno – Alcohol</h1>
  <div class="sub">
    <span>Cálculo automático de turnos, teóricas, atraso y WhatsApp</span>
    <span class="version" id="app_version">fix-turnos-final · clic para recargar</span>
  </div>
</header>

<div class="wrap">

<!-- ================= DATOS GENERALES ================= -->
<fieldset>
<legend>Datos generales</legend>
<div class="grid">
  <div class="col-6">
    <label for="fecha">Fecha (del turno)</label>
    <input type="date" id="fecha">
  </div>

  <div class="col-6">
    <label for="turno">Turno</label>
    <select id="turno" required>
      <option value="">-- Seleccione --</option>

      <!-- TURNO 1 -->
      <option value="1_0700_1500" data-turno="1" data-start="07:00" data-end="15:00" data-cross="same">
        Turno 1 (07:00–15:00)
      </option>
      <option value="1_0700_1623" data-turno="1" data-start="07:00" data-end="16:23" data-cross="same">
        Turno 1 (07:00–16:23)
      </option>

      <!-- TURNO 2 -->
      <option value="2_1500_2300" data-turno="2" data-start="15:00" data-end="23:00" data-cross="same">
        Turno 2 (15:00–23:00)
      </option>
      <option value="2_1623_0145" data-turno="2" data-start="16:23" data-end="01:45" data-cross="next">
        Turno 2 (16:23–01:45)
      </option>

      <!-- TURNO 3 -->
      <option value="3_2300_0700" data-turno="3" data-start="23:00" data-end="07:00" data-cross="next">
        Turno 3 (23:00–07:00)
      </option>
    </select>
  </div>
</div>
</fieldset>

</div>

<div class="actionbar">
  <button class="primary">Generar</button>
  <button class="success">WhatsApp</button>
  <button class="ghost">Copiar</button>
  <button class="secondary">Limpiar</button>
</div>

<script>
(function(){
const APP_VERSION="fix-turnos-final";
const fecha=document.getElementById("fecha");
const turnoSel=document.getElementById("turno");

function parseDateOnlyLocal(s){
  const [y,m,d]=s.split("-").map(Number);
  return new Date(y,m-1,d,0,0,0,0);
}

// ===== FUNCIÓN CENTRAL DE TURNOS =====
function getShiftBoundsLocal(dateStr){
  if(!dateStr||!turnoSel.value) return null;

  const opt=turnoSel.selectedOptions[0];
  const turnoNum=opt.dataset.turno;
  const base=parseDateOnlyLocal(dateStr);

  let start=new Date(base);
  let end=new Date(base);

  const isSaturday=base.getDay()===6;

  if(isSaturday){
    if(turnoNum==="1"){
      start.setHours(6,35,0,0);
      end.setHours(14,10,0,0);
    } else if(turnoNum==="2"){
      start.setHours(14,10,0,0);
      end.setHours(21,45,0,0);
    } else if(turnoNum==="3"){
      start.setHours(23,0,0,0);
      end.setHours(7,0,0,0);
      end.setDate(end.getDate()+1);
    }
  } else {
    const [sh,sm]=opt.dataset.start.split(":").map(Number);
    const [eh,em]=opt.dataset.end.split(":").map(Number);
    start.setHours(sh,sm,0,0);
    end.setHours(eh,em,0,0);
    if(opt.dataset.cross==="next"||end<=start){
      end.setDate(end.getDate()+1);
    }
  }

  return {start,end,turnoNum,label:opt.textContent};
}

// ===== INIT =====
document.getElementById("app_version").onclick=()=>{
  location.href=location.href.split("?")[0]+"?v="+Date.now();
}
fecha.valueAsDate=new Date();

})();
</script>

</body>
</html>
